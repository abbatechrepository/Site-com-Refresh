services:
  mysql:
    image: mysql:8.4
    container_name: abbatech-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: refresh
      MYSQL_USER: refresh
      MYSQL_PASSWORD: refresh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: abbatech-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: abbatech-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
  minio_data:
